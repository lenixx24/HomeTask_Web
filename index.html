<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" charset="UTF-8">
    <title>Кошик покупок</title>
    
</head>
<body>
	<section class="basket">
		<div class="product-input">
			<input type="text" placeholder="Назва товару">	
			<button data-tooltip="Додати товар"> Додати </button>
		</div>

	<div class="product-item">
		Помідори
		<div class="amount-block">
			<span class="amount">2</span>
		</div>
		<span class="status">
			<button class="status-button"> Не куплено </button>
		</span>
	</div>
	
	<div class="product-item">
		Печиво
		<div class="amount-block">
			<button data-tooltip="Зменшити кількість" class="minus">-</button>
			<span class="amount">2</span>
			<button data-tooltip="Збільшити кількість" class="plus">+</button>
		</div>
		<span class="status">
			<button data-tooltip="Позначити як куплене" class="status-button"> Куплено </button>
			<button data-tooltip="Видалити товар" class="delete"> x </button> 
		</span>
	</div>
	<div class="product-item">
		<input type="text" value="Сир">
		<div class="amount-block">
			<button data-tooltip="Зменшити кількість" class="minus"> - </button>
			<span class="amount">1</span>
			<button data-tooltip="Збільшити кількість" class="plus"> + </button>
		</div>
		<span class="status"> 
			<button data-tooltip="Позначити як куплене" class="status-button"> Куплено </button>
			<button data-tooltip="Видалити товар" class="delete"> x </button> 
		</span>
	</div>
	</section>
	<aside class="short-basket">
		<div class="product-left">
			<header>Залишилось:</header>
			<span class="product-item"> 
				Печиво 
				<div class="amount-block">
					<span class="amount">2</span>
				</div>
			</span>
			<span class="product-item"> 
				Сир
				<div class="amount-block">
					<span class="amount">1</span>
				</div>
			</span>
		</div>
		<div class="product-bought">
			<header>Куплено:</header>
			<span class="product-item"> 
				Помідори
				<div class="amount-block">
					<span class="amount">2</span>
				</div>
			</span>
		</div>
	</aside>
	<div class="author-badge">
    <div class="badge-title">
        <span class="screen-only">BuyList</span>
        <span class="print-only">Шепетюк Ангеліна</span>
    </div>
    
    <div class="badge-details screen-only">
        Created by:<br>
        <strong>Шепетюк Ангеліна</strong> 
    </div>
</div>
</body>
</html>
