<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
    <title>Кошик покупок</title>
    <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
    <section class="basket">
        <div class="product-input">
            <input type="text" id="new-item-input" placeholder="Назва товару">  
            <button id="add-item-btn" data-tooltip="Додати товар"> Додати </button>
        </div>

        <div id="items-container"></div>
    </section>

    <aside class="short-basket">
        <div class="product-left">
            <header>Залишилось:</header>
            <div id="stats-left-container"></div>
        </div>
        <div class="product-bought">
            <header>Куплено:</header>
            <div id="stats-bought-container"></div>
        </div>
    </aside>

    <div class="author-badge">
        <div class="badge-title">
            <span class="screen-only">BuyList</span>
            <span class="print-only">Шепетюк Ангеліна</span>
        </div>
        <div class="badge-details screen-only">
            Created by:<br>
            <strong>Шепетюк Ангеліна</strong> 
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
